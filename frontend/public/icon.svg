<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background Circle with elegant gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" />
  <!-- Stylized Beaker Icon with Glowing Liquid -->
  <g transform="translate(128, 110)" filter="url(#shadow)">
    <!-- Liquid inside Beaker -->
    <path d="M60,180 L196,180 C220,240 200,260 180,270 L76,270 C56,260 36,240 60,180 Z" fill="#10b981" opacity="0.85" />
    <!-- Beaker Outline -->
    <path d="M96,30 L96,80 C96,85 92,90 88,95 L44,185 C24,225 40,280 96,280 L160,280 C216,280 232,225 212,185 L168,95 C164,90 160,85 160,80 L160,30" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Bubbles -->
    <circle cx="96" cy="210" r="10" fill="#ffffff" opacity="0.7" />
    <circle cx="150" cy="180" r="14" fill="#ffffff" opacity="0.6" />
    <circle cx="120" cy="150" r="8" fill="#ffffff" opacity="0.8" />
  </g>
</svg>
